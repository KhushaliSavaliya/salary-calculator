<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalaryPro | Smart Salary Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 font-['Inter'] min-h-screen flex items-center justify-center p-4">

    <div
        class="max-w-5xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col lg:flex-row border border-slate-100">

        <div class="lg:w-3/5 p-8 md:p-12">
            <header class="mb-10">
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Salary Calculator</h1>
                <p class="text-slate-500 mt-2">Adjusted for 2nd/4th Saturdays and custom leaves.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Target Month</label>
                    <input type="month" id="monthInput"
                        class="custom-input w-full p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Base Monthly Salary ($)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">$</span>
                        <input type="number" id="baseSalary" placeholder="5000"
                            class="custom-input w-full p-4 pl-8 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Monthly Paid Leave Quota</label>
                    <input type="number" id="plQuota" value="1"
                        class="custom-input w-full p-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Total Leaves Taken</label>
                    <input type="number" id="totalLeaves" value="0"
                        class="custom-input w-full p-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 outline-none">
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Public Holidays this Month</label>
                    <input type="number" id="holidays" value="0"
                        class="custom-input w-full p-4 rounded-2xl bg-slate-50 border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                </div>
            </div>

            <button id="calculateBtn"
                class="w-full mt-8 bg-slate-900 hover:bg-indigo-600 text-white font-bold py-5 rounded-2xl transition-all duration-300 transform hover:-translate-y-1 shadow-xl">
                Generate Report
            </button>
        </div>

        <div
            class="lg:w-2/5 bg-indigo-600 p-8 md:p-12 text-white flex flex-col justify-between relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-64 h-64 bg-indigo-500 rounded-full opacity-50"></div>

            <div class="relative z-10">
                <h3 class="text-indigo-100 uppercase tracking-widest text-xs font-bold mb-10">Calculated Breakdown</h3>

                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-indigo-100">Total Calendar Days</span>
                        <span id="resTotalDays" class="text-xl font-semibold">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-indigo-100">Weekends (Sun + 2/4 Sat)</span>
                        <span id="resOffDays" class="text-xl font-semibold text-indigo-300">0</span>
                    </div>
                    <div class="flex justify-between items-center border-t border-indigo-500 pt-4">
                        <span class="text-indigo-100 font-bold">Standard Working Days</span>
                        <span id="resWorkDays" class="text-xl font-bold">0</span>
                    </div>
                </div>
            </div>

            <div class="relative z-10 mt-12 pt-8 border-t border-indigo-400">
                <p class="text-indigo-200 text-sm font-medium">Estimated Net Payout</p>
                <div class="flex items-baseline gap-2">
                    <span class="text-2xl font-light text-indigo-200">$</span>
                    <h1 id="finalSalary" class="text-6xl font-black tracking-tighter">0.00</h1>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
